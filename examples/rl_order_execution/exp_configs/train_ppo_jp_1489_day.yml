simulator:
  data_granularity: 1
  time_per_step: 1
  vol_limit: null
env:
  concurrency: 1
  parallel_mode: dummy
action_interpreter:
  class: CategoricalActionInterpreter
  kwargs:
    values: 4
    max_step: 1
  module_path: qlib.rl.order_execution.interpreter
state_interpreter:
  class: FullHistoryStateInterpreter
  kwargs:
    data_dim: 5
    data_ticks: 1
    max_step: 1
    processed_data_provider:
      class: HandlerProcessedDataProvider
      kwargs:
        data_dir: ./data/jp_1489/pickle/
        feature_columns_today: ["$high", "$low", "$open", "$close", "$volume"]
        feature_columns_yesterday: ["$high_1", "$low_1", "$open_1", "$close_1", "$volume_1"]
        backtest: false
      module_path: qlib.rl.data.native
  module_path: qlib.rl.order_execution.interpreter
reward:
  class: PPOReward
  kwargs:
    max_step: 1
    start_time_index: 0
    end_time_index: 0
  module_path: qlib.rl.order_execution.reward
data:
  source:
    order_dir: ./data/jp_1489/orders
    feature_root_dir: ./data/jp_1489/pickle/
    feature_columns_today: ["$close0", "$volume0"]
    feature_columns_yesterday: []
    total_time: 1
    default_start_time_index: 0
    default_end_time_index: 1
    proc_data_dim: 5
  num_workers: 0
  queue_size: 20
network:
  class: Recurrent
  module_path: qlib.rl.order_execution.network
policy:
  class: PPO  # PPO, DQN
  kwargs:
    lr: 0.0001
  module_path: qlib.rl.order_execution.policy
runtime:
  seed: 42
  use_cuda: false
trainer:
  max_epoch: 100
  repeat_per_collect: 8
  earlystop_patience: 50
  episode_per_collect: 256
  batch_size: 128
  val_every_n_epoch: 2
  checkpoint_path: ./outputs/jp_1489_ppo_day
  checkpoint_every_n_iters: 1
